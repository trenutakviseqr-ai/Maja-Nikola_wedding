<script>

const client = window.supabase.createClient(
  "https://zargjchqjtnidsgoqcop.supabase.co",
  "sb_publishable_SrJc_iXxzQuVZlijAh00qQ_Z1XTMcJe"
);

let images = [];
let current = 0;

function enter(){
  document.getElementById("login").style.opacity = "0";

  setTimeout(()=>{
    document.getElementById("login").style.display="none";
    document.body.style.overflowY = "auto";
    loadGallery();
  },500);
}

/* UPLOAD */
function upload(){
  document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", async (e)=>{

  const uploadBtn = document.querySelector(".upload-btn");

  uploadBtn.innerText = "Uploading... ⏳";
  uploadBtn.disabled = true;

  const selectedFiles = Array.from(e.target.files);

  if(selectedFiles.length > 10){
    alert("Možete uploadati maksimalno 10 slika odjednom 📸");
  }

  const files = selectedFiles.slice(0,10);

  for(const file of files){

    const filename = Date.now() + "_" + file.name;

    const { error } = await client.storage
      .from("MajaZalac")
      .upload(filename, file);

    if(error){
      console.error(error);
      alert("Greška kod uploada: " + error.message);
    }
  }

  await loadGallery();

  uploadBtn.innerText = "📸 Dodaj slike (max10)";
  uploadBtn.disabled = false;
});

/* LOAD GALLERY */
async function loadGallery(){

  const { data, error } = await client.storage
    .from("MajaZalac")
    .list("", { limit: 10000 });

  if(error){
    console.error(error);
    return;
  }

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";
  images = [];

  data
    .sort((a,b)=> b.name.localeCompare(a.name))
    .forEach((file,index)=>{

      const { data:urlData } = client.storage
        .from("MajaZalac")
        .getPublicUrl(file.name);

      const url = urlData.publicUrl;

      images.push(url);

      const img = document.createElement("img");
      img.src = url;
      img.loading = "lazy";
      img.style.animationDelay = (index * 0.1) + "s";

      img.onclick = ()=>{
        current = index;
        openLightbox();
      };

      gallery.appendChild(img);
    });
}

/* LIGHTBOX */
function openLightbox(){
  const lb = document.getElementById("lightbox");
  lb.style.display = "flex";
  showImage();
}

function showImage(){
  document.getElementById("lightbox-img").src = images[current];
}

function next(){
  current = (current + 1) % images.length;
  showImage();
}

function prev(){
  current = (current - 1 + images.length) % images.length;
  showImage();
}

document.getElementById("lightbox").addEventListener("click",(e)=>{
  if(e.target.id === "lightbox"){
    document.getElementById("lightbox").style.display = "none";
  }
});

document.addEventListener("keydown",(e)=>{

  if(document.getElementById("lightbox").style.display === "flex"){

    if(e.key === "ArrowRight") next();
    if(e.key === "ArrowLeft") prev();

    if(e.key === "Escape"){
      document.getElementById("lightbox").style.display = "none";
    }
  }
});

/* DOWNLOAD */
async function downloadAll(){

  const zip = new JSZip();

  for(let i=0;i<images.length;i++){

    const res = await fetch(images[i]);
    const blob = await res.blob();

    zip.file("slika_" + (i+1) + ".jpg", blob);
  }

  const content = await zip.generateAsync({type:"blob"});

  const a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "svadba_slike.zip";
  a.click();
}

</script>
